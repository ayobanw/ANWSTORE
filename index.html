<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANWSTORE - CPM1 TOOL</title>
    <!-- Pautan untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            font-family: 'sans-serif'; 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
        }
        
        /* Video Logo dengan Glow */
        .logo-container { margin-top: 20px; margin-bottom: 20px; }
        video { 
            width: 150px; 
            height: 150px; 
            border-radius: 30px; 
            border: 3px solid #facc15; 
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.5);
            object-fit: cover;
        }

        /* Tulisan ANWSTORE Bergerak Pelangi */
        .brand-name { 
            font-size: 32px; 
            font-weight: bold; 
            background: linear-gradient(to right, #facc15, #4ade80, #38bdf8, #facc15); 
            background-size: 200% auto;
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 5px;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .tagline { color: #94a3b8; font-size: 14px; margin-bottom: 5px; }
        .status { color: #4ade80; font-size: 12px; margin-bottom: 30px; }

        /* Butang Moden */
        .btn-container { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .btn { 
            width: 90%; 
            max-width: 400px; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: bold; 
            text-decoration: none; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            font-size: 16px; 
            transition: 0.3s;
        }
        .btn-purple { background: linear-gradient(90deg, #7c3aed, #a855f7); box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); }
        .btn-dark { background: #1e293b; border: 1px solid #334155; }

        /* Kotak Statistik (Grid) */
        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-top: 40px; 
            max-width: 500px; 
            margin-left: auto; 
            margin-right: auto; 
        }
        .stat-box { 
            background: #111827; 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid #1f2937; 
            text-align: center; 
        }
        .stat-box i { font-size: 24px; margin-bottom: 10px; display: block; }
        .stat-val { font-size: 20px; font-weight: bold; display: block; }
        .stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; margin-top: 5px; }

        /* Warna Ikon */
        .blue { color: #38bdf8; }
        .green { color: #4ade80; }
        .yellow { color: #fbbf24; }
        .red { color: #f87171; }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- Pastikan nama fail video.mp4 betul di GitHub anda -->
        <video autoplay loop muted playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="brand-name">ANWSTORE</div>
    <div class="tagline">CPM1 TOOL</div>
    <div class="status">● Server Online 24 Jam</div>

    <div class="btn-container">
        <a href="https://wa.me/60105467200" class="btn btn-purple">
            <i class="fas fa-sign-in-alt"></i> Tempah Sekarang
        </a>
        <a href="https://t.me/anwstore" class="btn btn-dark">
            <i class="fas fa-user-plus"></i> Join Group Telegram
        </a>
    </div>
    <div class="stats-grid">
        <div class="stat-box">
            <i class="fas fa-tools blue"></i>
            <span class="stat-val">500+</span>
            <span class="stat-label">Projek Siap</span>
        </div>
        <div class="stat-box">
            <i class="fas fa-clock green"></i>
            <span class="stat-val">24/7</span>
            <span class="stat-label">Servis Pantas</span>
        </div>
        <div class="stat-box">
            <i class="fas fa-bolt yellow"></i>
            <span class="stat-val">99%</span>
            <span class="stat-label">Kualiti Besi</span>
        </div>
        <div class="stat-box">
            <i class="fas fa-star red"></i>
            <span class="stat-val">4.9</span>
            <span class="stat-label">Rating Pelanggan</span>
        </div>
    </div>

</body>
</html>
