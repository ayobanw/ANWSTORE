<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANW STORE - Metalwork Expert</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #080808; color: white; margin: 0; }
        .tab-content { display: none; padding: 20px; padding-bottom: 90px; }
        .tab-content.active { display: block; }
        
        /* Navigasi Bawah */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #666; text-align: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: #8b5cf6; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }

        /* Butang & Kad */
        .btn-custom { display: block; width: 85%; margin: 10px auto; padding: 15px; border-radius: 15px; text-align: center; text-decoration: none; font-weight: bold; color: white; }
        .btn-masuk { background: linear-gradient(90deg, #8b5cf6, #d946ef); }
        .btn-daftar { background: #1f1f1f; border: 1px solid #333; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="beranda" class="tab-content active">
    <div style="display: flex; flex-direction: column; align-items: center; margin-top: 20px;">
        <video width="120" height="120" autoplay loop muted playsinline style="border-radius: 25px; border: 3px solid #eab308;">
            <source src="video.mp4" type="video/mp4">
        </video>
        <h1>ANW STORE</h1>
        <p>Tools CPM & Metalwork Expert</p>
        <a href="#" class="btn-custom btn-masuk">Masuk Sekarang</a>
        <a href="mailto:cicakayob@gmail.com" class="btn-custom btn-daftar">Daftar Akun Baru</a>
    </div>
</div>

<div id="store" class="tab-content">
    <h2>Store CPM</h2>
    <div class="card">Copy All Cars - <span style="color:green;">GRATIS</span></div>
    <div class="card">Inject Premium Cars - <span style="color:orange;">RM 3</span></div>
</div>

<div id="topup" class="tab-content">
    <h2>Top Up SALDO</h2>
    <div class="card" style="text-align:center;">
        <p>Scan QRIS</p>
        <div style="background:white; padding:10px; border-radius:10px; display:inline-block;">[Gambar QR Anda]</div>
    </div>
</div>

<div id="profil" class="tab-content">
    <h2>Profil AKUN</h2>
    <div class="card">
        <h3>anwstore</h3>
        <p>cicakayob@gmail.com</p>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="showTab('beranda', this)"><i class="fas fa-home"></i>Beranda</div>
    <div class="nav-item" onclick="showTab('store', this)"><i class="fas fa-shopping-cart"></i>Store</div>
    <div class="nav-item" onclick="showTab('topup', this)"><i class="fas fa-wallet"></i>Top Up</div>
    <div class="nav-item" onclick="showTab('profil', this)"><i class="fas fa-user"></i>Profil</div>
</div>

<script>
function showTab(id, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}
</script>
</body>
</html>
